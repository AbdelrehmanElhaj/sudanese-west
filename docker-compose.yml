services:
  swgame-server:
    build: ./server
    container_name: swgame-server
    restart: unless-stopped
    networks:
      - internal

  swgame-web:
    build:
      context: ./sudanese_west
      args:
        WS_URL: wss://swgame.hdrelhaj.com/ws
    container_name: swgame-web
    restart: unless-stopped
    depends_on:
      - swgame-server
    networks:
      - web
      - internal
    environment:
      VIRTUAL_HOST: swgame.hdrelhaj.com
      VIRTUAL_PORT: 80
      LETSENCRYPT_HOST: swgame.hdrelhaj.com
      LETSENCRYPT_EMAIL: a.elhaj@proptech.sa

networks:
  web:
    external: true
  internal:
    driver: bridge
