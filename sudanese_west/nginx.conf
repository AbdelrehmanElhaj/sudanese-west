server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy WebSocket connections to the internal game server
    location /ws {
        proxy_pass http://swgame-server:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Flutter web SPA — all routes served from index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Cache Flutter build assets aggressively
    location ~* \.(js|wasm|png|ico|svg|ttf|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
